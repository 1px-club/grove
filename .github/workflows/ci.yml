name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint commit messages
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="refs/remotes/origin/${{ github.base_ref }}"
            PR_HEAD="${{ github.event.pull_request.head.sha }}"

            git fetch --no-tags --depth=1 origin \
              "+refs/heads/${{ github.base_ref }}:${BASE_REF}"

            FROM="$(git merge-base "$PR_HEAD" "$BASE_REF")"
            TO="$PR_HEAD"
            echo "Linting pull request commit messages"
            pnpm exec commitlint --from "$FROM" --to "$TO" --verbose
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "Linting latest commit message"
            git log -1 --format=%B "${{ github.sha }}" | pnpm exec commitlint --verbose
          else
            BEFORE="${{ github.event.before }}"
            TO="${{ github.sha }}"

            if git rev-parse --verify "${BEFORE}^{commit}" >/dev/null 2>&1 && \
              git merge-base --is-ancestor "$BEFORE" "$TO"; then
              echo "Linting push commit messages"
              pnpm exec commitlint --from "$BEFORE" --to "$TO" --verbose
            else
              echo "Linting latest commit message"
              git log -1 --format=%B "$TO" | pnpm exec commitlint --verbose
            fi
          fi

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build
